image: registry.gitlab.com/pages/hugo:v0.164.0  # mesma versão validada localmente (checksum conferido)

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  HUGO_ENVIRONMENT: production
  HUGO_ENV: production

pages:
  script:
    - hugo --gc --minify
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
