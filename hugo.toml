baseURL = "https://chcoutinho.com/"
title = "Chris Coutinho"
theme = "hugo-coder"
locale = "pt-br"  # renomeado de "languageCode" (deprecado desde Hugo v0.158.0)
defaultContentLanguage = "pt-br"  # AJUSTAR: troquei de "en" pra "pt-br" pois o conteúdo parece ser em português. Se quiser inglês como padrão, volte para "en".
enableEmoji = true

[pagination]
pagerSize = 6

[services]
[services.disqus]
# Comentários via Disqus desativados por padrão.
# Se ativar: Disqus carrega JS de terceiro (disqus.com) que rastreia visitantes.
# Se ativar, lembre de liberar disqus.com no CSP (params.csp abaixo) e na Cloudflare Transform Rule.
# shortname = "yourdiscussshortname"

[markup]
[markup.highlight]
noClasses = false

[markup.goldmark]
[markup.goldmark.renderer]
# SEGURANÇA: alterado de "true" para "false" (padrão seguro do Hugo).
# "true" permite HTML bruto dentro do Markdown, renderizado sem sanitização —
# risco de XSS caso algum dia você cole conteúdo de terceiros sem revisar,
# ou aceite posts/PRs de outra pessoa no repositório.
# Só volte para "true" se tiver certeza que precisa de HTML bruto nos posts
# e que você é o único a escrever conteúdo.
unsafe = false

[params]
author = "Christian Coutinho"  # AJUSTAR se preferir outro nome de exibição
# license = '<a rel="license" href="http://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA-4.0</a>'
description = "Site pessoal de Christian Coutinho"  # AJUSTAR
keywords = "CISO,cybersecurity,pessoal"
info = ["Cybersecurity Professional"]
avatarURL = "images/avatar.jpg"  # arquivo real fica em static/images/avatar.jpg (partial usa relURL direto, sem pipeline de assets)
#gravatar = "seu-email@exemplo.com"
# Fallback temporário: o exampleSite do tema não trouxe apple-touch-icon (180x180)
# nem safari-pinned-tab (SVG monocromático) prontos. Apontando pros favicons que
# já existem, pra não dar 404, até você gerar versões dedicadas do seu avatar.
touchicon = "/images/favicon-32x32.png"
mask_icon = "/images/favicon.svg"
dateFormat = "January 2, 2006"
since = 2026  # AJUSTAR: ano de início do site/blog
# Git Commit in Footer — desativado.
# A linha original apontava para o repositório do AUTOR DO TEMA (luizdepra), não o seu.
# Se quiser reativar, use a URL do SEU repositório:
# commit = "https://gitlab.com/SEU-USUARIO/chcoutinho-site/tree/"
rtl = false
colorScheme = "auto"
hideColorSchemeToggle = false
maxSeeAlsoItems = 5
customCSS = []
customSCSS = []
customJS = []
customRemoteJS = []

# Nenhum serviço de analytics ativado — mantém o site sem rastreamento de terceiros
# e o CSP mais restritivo abaixo. Se quiser ativar algum no futuro
# (ex: Umami ou Plausible self-hosted são as opções mais respeitosas de privacidade),
# lembre de liberar o domínio correspondente no CSP e na Cloudflare.

# SEGURANÇA: CSP ativado por padrão, restritivo (só recursos do próprio site).
# Isso gera uma tag <meta http-equiv="Content-Security-Policy"> no HTML.
# Nota: <meta> CSP não suporta "frame-ancestors" nem "report-uri" — por isso,
# mantenha também a Cloudflare Transform Rule com os mesmos valores como
# cabeçalho HTTP real (mais robusto, complementa esta camada).
[params.csp]
childsrc = ["'self'"]
fontsrc = ["'self'"]
formaction = ["'self'"]
framesrc = ["'none'"]
imgsrc = ["'self'"]
objectsrc = ["'none'"]
prefetchsrc = ["'self'"]
stylesrc = ["'self'", "'unsafe-inline'"]
scriptsrc = ["'self'"]
connectsrc = ["'self'"]

[taxonomies]
category = "categories"
series = "series"
tag = "tags"
author = "authors"

[[params.social]]
name = "LinkedIn"
icon = "fa-brands fa-linkedin fa-2x"
weight = 1
url = "https://www.linkedin.com/in/christian-coutinho"

